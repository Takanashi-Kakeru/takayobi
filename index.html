<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>타카호출하기</title>
    <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            display: flex; justify-content: center; align-items: center; min-height: 100vh; 
            background-color: #ffe4e8; background-image: url('IMG_0916.jpeg');
            background-size: cover; background-position: center; background-repeat: no-repeat; 
            font-family: 'Jua', sans-serif; color: #ff7b93; 
        }
        .card { 
            text-align: center; background: rgba(255, 255, 255, 0.95); padding: 40px 30px; 
            border-radius: 35px; box-shadow: 0 15px 35px rgba(255, 182, 193, 0.5); 
            width: 85%; max-width: 340px; backdrop-filter: blur(5px); border: 3px dashed #ffc0cb;
        }
        h1 { font-size: 2.2rem; margin-bottom: 5px; color: #ff6b8b; }
        .subtitle { font-size: 1.1rem; color: #ffa8b6; margin-bottom: 25px; }

        .btn { 
            width: 130px; height: 130px; border-radius: 50%; 
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            border: none; cursor: pointer; display: inline-flex; justify-content: center; align-items: center;
            box-shadow: 0 10px 20px rgba(255, 154, 158, 0.4), inset 0 -5px 10px rgba(0,0,0,0.1); 
            transition: all 0.3s ease;
        }
        .btn:active { transform: scale(0.9) translateY(5px); }
        .btn.disabled { background: #cbd5e1; box-shadow: none; cursor: not-allowed; animation: none; transform: none; }

        .paw-icon { color: white; font-size: 55px; animation: float 2s ease-in-out infinite; }
        .btn.disabled .paw-icon { color: #94a3b8; animation: none; }
        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-6px); } 100% { transform: translateY(0px); } }

        .status { margin-top: 25px; font-size: 1.1rem; color: #ff8fa3; min-height: 25px; display: flex; justify-content: center; align-items: center; gap: 8px; }
        .spin { animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="card">
        <h1>타카호출하기</h1>
        <p class="subtitle">타카가 필요한 순간! 지금 눌러서 부르기</p>
        
        <button class="btn" id="trigger" onclick="wake()">
            <i class="fa-solid fa-paw paw-icon"></i>
        </button>
        
        <div class="status" id="msg">
            <i class="fa-solid fa-ellipsis"></i><span>호출 대기중</span>
        </div>
    </div>

    <script>
        const whistleSnd = new Audio('whistle.mp3'); 
        const successSnd = new Audio('success.mp3'); 
        const dndSnd = new Audio('dnd.mp3');         
        const errorSnd = new Audio('error.mp3');     
        
        const btn = document.getElementById('trigger');
        const msg = document.getElementById('msg');
        
        function stopAllSounds() {
            const sounds = [whistleSnd, successSnd, dndSnd, errorSnd];
            sounds.forEach(snd => {
                snd.pause();
                snd.currentTime = 0;
            });
        }

        window.onload = updateTimer;
        
        function startCooldown() {
            localStorage.setItem('cooldownEnd', Date.now() + (1 * 60 * 1000));
            updateTimer();
        }

        function updateTimer() {
            const end = localStorage.getItem('cooldownEnd');
            if (end) {
                const left = Math.ceil((end - Date.now()) / 1000);
                if (left > 0) {
                    btn.classList.add('disabled');
                    btn.onclick = null; 
                    
                    const m = Math.floor(left / 60).toString().padStart(2, '0');
                    const s = (left % 60).toString().padStart(2, '0');
                    msg.innerHTML = `<i class="fa-solid fa-clock"></i><span>다음 호출까지 ${m}:${s} 대기</span>`;
                    msg.style.color = "#94a3b8";
                    
                    setTimeout(updateTimer, 1000); 
                } else {
                    localStorage.removeItem('cooldownEnd');
                    btn.classList.remove('disabled');
                    btn.onclick = wake; 
                    msg.innerHTML = `<i class="fa-solid fa-ellipsis"></i><span>호출 대기중</span>`;
                    msg.style.color = "#ff8fa3";
                }
            }
        }

        function wake() {
            stopAllSounds();
            whistleSnd.play().catch(e => console.log(e));

            const urlParams = new URLSearchParams(window.location.search);
            const secretId = urlParams.get('id'); 
            const validIds = ['xdmh', 'jaym', 'dgrt', 'tgdy', 'aprk', 'taiy'];
            
            if (!secretId || !validIds.includes(secretId)) {
                stopAllSounds();
                errorSnd.play().catch(e => console.log(e)); 
                
                msg.style.color = "#ef4444";
                msg.innerHTML = `<i class="fa-solid fa-link-slash"></i><span>전용 링크가 아닙니다! 주소를 확인해주세요.</span>`;
                return; 
            }
            
            const baseUrl = "https://script.google.com/macros/s/AKfycbw3FHOmMWb-bdpMOzLvto7CJOKRcUNJQuTMnR8lYOOu4iHulO8M0loDyeMS_LkvT7k8/exec"; 
            const url = baseUrl + "?id=" + encodeURIComponent(secretId);
            
            msg.style.color = "#ff6b8b";
            msg.innerHTML = `<i class="fa-solid fa-spinner spin"></i><span>신호 보내는 중...</span>`;
            
            fetch(url)
                .then(res => res.json())
                .then(data => {
                    stopAllSounds();

                    if (data.status === "error") {
                        if (data.msg === "invalid") {
                            errorSnd.play().catch(e => {}); 
                            msg.style.color = "#ef4444";
                            msg.innerHTML = `<i class="fa-solid fa-link-slash"></i><span>유효하지 않은 링크입니다.</span>`;
                        }
                        else if (data.msg === "dnd") {
                            dndSnd.play().catch(e => {}); 
                            msg.style.color = "#8b5cf6"; 
                            msg.innerHTML = `<i class="fa-solid fa-moon"></i><span>타카님은 지금 휴식 중입니다</span>`;
                        } else if (data.msg === "cooldown") {
                            errorSnd.play().catch(e => {}); 
                            startCooldown();
                        }
                    } else {
                        successSnd.play().catch(e => {}); 
                        confetti({ particleCount: 150, spread: 80, origin: { y: 0.6 } });
                        
                        msg.style.color = "#ff477e";
                        msg.innerHTML = `<i class="fa-solid fa-circle-check"></i><span>호출 성공! 곧 달려갑니다</span>`;
                        
                        setTimeout(() => { startCooldown(); }, 3000);
                    }
                })
                .catch(() => {
                    stopAllSounds();
                    errorSnd.play().catch(e => {}); 
                    msg.style.color = "#ef4444";
                    msg.innerHTML = `<i class="fa-solid fa-circle-exclamation"></i><span>전송 실패! 다시 눌러주세요</span>`;
                });
        }
    </script>
</body>
</html>
