<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>타카호출하기</title>
    <!-- 귀여운 둥근 폰트(Jua) 불러오기 -->
    <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            background-color: #ffe4e8; 
            /* 하트 패턴 배경 */
            background-image: url('data:image/svg+xml;utf8,<svg width="60" height="60" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg"><path d="M30 25.5 C30 15 15 15 15 25.5 C15 35 30 45 30 45 C30 45 45 35 45 25.5 C45 15 30 15 30 25.5 Z" fill="%23ffffff" fill-opacity="0.6" /></svg>');
            background-size: 60px 60px;
            font-family: 'Jua', sans-serif; 
            color: #ff7b93; 
        }

        .card { 
            text-align: center; 
            background: rgba(255, 255, 255, 0.9); 
            padding: 40px 30px; 
            border-radius: 35px; 
            box-shadow: 0 15px 35px rgba(255, 182, 193, 0.5); 
            width: 85%; 
            max-width: 340px; 
            backdrop-filter: blur(5px);
            border: 3px dashed #ffc0cb;
        }

        h1 { 
            font-size: 2.2rem; 
            margin-bottom: 5px; 
            color: #ff6b8b;
        }
        
        .subtitle {
            font-size: 1.1rem;
            color: #ffa8b6;
            margin-bottom: 25px;
        }

        /* 핑크 버튼 디자인 */
        .btn { 
            width: 130px; 
            height: 130px; 
            border-radius: 50%; 
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            border: none; 
            cursor: pointer; 
            box-shadow: 0 10px 20px rgba(255, 154, 158, 0.4), inset 0 -5px 10px rgba(0,0,0,0.1); 
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            display: inline-flex;
            justify-content: center;
            align-items: center;
        }

        .btn:active { 
            transform: scale(0.9) translateY(5px); 
            box-shadow: 0 5px 10px rgba(255, 154, 158, 0.4), inset 0 -2px 5px rgba(0,0,0,0.1); 
        }

        /* 버튼 위 둥둥 뜨는 발바닥 아이콘 */
        .paw-icon {
            fill: white;
            width: 65px;
            height: 65px;
            animation: float 2s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-6px); }
            100% { transform: translateY(0px); }
        }

        /* 상태 메시지 구역 (이모지 대신 SVG 아이콘 정렬) */
        .status { 
            margin-top: 25px; 
            font-size: 1.1rem; 
            color: #ff8fa3; 
            min-height: 25px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px; /* 텍스트와 아이콘 사이 간격 */
        }

        /* 텍스트 옆 작은 SVG 아이콘 설정 */
        .inline-icon {
            width: 20px;
            height: 20px;
        }

        /* 로딩 중 회전 애니메이션 */
        .spin {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>타카호출하기</h1>
        <p class="subtitle">타카가 필요한 순간! 지금 눌러서 부르기</p>
        
        <button class="btn" id="trigger" onclick="wake()">
            <!-- 버튼의 발바닥 커스텀 SVG -->
            <svg class="paw-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M8.5 7.5c-1.38 0-2.5-1.12-2.5-2.5S7.12 2.5 8.5 2.5 11 3.62 11 5 9.88 7.5 8.5 7.5zm7 0c-1.38 0-2.5-1.12-2.5-2.5S14.12 2.5 15.5 2.5 18 3.62 18 5 16.88 7.5 15.5 7.5zm-11 5c-1.38 0-2.5-1.12-2.5-2.5S3.12 7.5 4.5 7.5 7 8.62 7 10 5.88 12.5 4.5 12.5zm15 0c-1.38 0-2.5-1.12-2.5-2.5s-1.12-2.5-2.5-2.5-2.5 1.12-2.5 2.5 1.12 2.5 2.5 2.5zM12 11.5c-2.8 0-6 1.79-6 4.5v1.5c0 1.66 1.34 3 3 3h6c1.66 0 3-1.34 3-3v-1.5c0-2.71-3.2-4.5-6-4.5z" />
            </svg>
        </button>
        
        <div class="status" id="msg">
            <svg class="inline-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
            <span>연결 대기중...</span>
        </div>
    </div>

    <script>
        // 상태별로 교체할 커스텀 SVG 아이콘 코드
        const svgLoading = `<svg class="inline-icon spin" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="2" x2="12" y2="6"></line><line x1="12" y1="18" x2="12" y2="22"></line><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"></line><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"></line><line x1="2" y1="12" x2="6" y2="12"></line><line x1="18" y1="12" x2="22" y2="12"></line><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"></line><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"></line></svg>`;
        const svgSuccess = `<svg class="inline-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>`;
        const svgError = `<svg class="inline-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>`;

        function wake() {
            const msg = document.getElementById('msg');
            
            // 입력해주신 완성된 웹앱 주소
            const url = "https://script.google.com/macros/s/AKfycbw3FHOmMWb-bdpMOzLvto7CJOKRcUNJQuTMnR8lYOOu4iHulO8M0loDyeMS_LkvT7k8/exec"; 
            
            // 전송 중 상태 (로딩 아이콘 + 텍스트)
            msg.style.color = "#ff6b8b";
            msg.innerHTML = svgLoading + "<span>신호 보내는 중...</span>";
            
            fetch(url)
                .then(() => {
                    // 성공 상태 (체크 아이콘 + 텍스트)
                    msg.style.color = "#ff477e";
                    msg.innerHTML = svgSuccess + "<span>호출 성공! 곧 달려갑니다</span>";
                })
                .catch(() => {
                    // 실패 상태 (경고 아이콘 + 텍스트)
                    msg.style.color = "#ef4444";
                    msg.innerHTML = svgError + "<span>실패했어요! 다시 눌러주세요</span>";
                });
        }
    </script>
</body>
</html>
