<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>타카호출하기</title>
    <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            background-color: #ffe4e8; /* 이미지가 모자란 부분은 이 파스텔 핑크색으로 자연스럽게 채워집니다 */
            
            background-image: url('IMG_0916.jpeg');
            
            /* 💡 가로를 화면에 100% 딱 맞추고, 세로는 비율을 유지해 커지게 하는 마법의 코드 */
            background-size: cover; 
            
            /* 이미지를 화면 맨 위쪽부터 보여지게 정렬합니다 */
            background-position: center; 
            
            /* 이미지를 바둑판처럼 반복하지 않고 한 번만 큼직하게 띄웁니다 */
            background-repeat: no-repeat; 
            
            font-family: 'Jua', sans-serif; 
            color: #ff7b93; 
        }


        .card { 
            text-align: center; 
            background: rgba(255, 255, 255, 0.95); 
            padding: 40px 30px; 
            border-radius: 35px; 
            box-shadow: 0 15px 35px rgba(255, 182, 193, 0.5); 
            width: 85%; 
            max-width: 340px; 
            backdrop-filter: blur(5px);
            border: 3px dashed #ffc0cb;
        }

        h1 { font-size: 2.2rem; margin-bottom: 5px; color: #ff6b8b; }
        .subtitle { font-size: 1.1rem; color: #ffa8b6; margin-bottom: 25px; }

        .btn { 
            width: 130px; height: 130px; border-radius: 50%; 
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            border: none; cursor: pointer; 
            box-shadow: 0 10px 20px rgba(255, 154, 158, 0.4), inset 0 -5px 10px rgba(0,0,0,0.1); 
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            display: inline-flex; justify-content: center; align-items: center;
        }

        .btn:active { 
            transform: scale(0.9) translateY(5px); 
            box-shadow: 0 5px 10px rgba(255, 154, 158, 0.4), inset 0 -2px 5px rgba(0,0,0,0.1); 
        }

        .paw-icon {
            color: white; font-size: 55px; 
            animation: float 2s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-6px); }
            100% { transform: translateY(0px); }
        }

        .status { 
            margin-top: 25px; font-size: 1.1rem; color: #ff8fa3; 
            min-height: 25px; display: flex; justify-content: center; align-items: center; gap: 8px; 
        }

        .spin { animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="card">
        <h1>타카호출하기</h1>
        <p class="subtitle">타카가 필요한 순간! 지금 눌러서 부르기</p>
        
        <button class="btn" id="trigger" onclick="wake()">
            <i class="fa-solid fa-paw paw-icon"></i>
        </button>
        
        <div class="status" id="msg">
            <i class="fa-solid fa-ellipsis"></i>
            <span>호출 대기중...</span>
        </div>
    </div>

    <script>
        function wake() {
            const msg = document.getElementById('msg');
            
            // 1. 주소에서 'id' 가져오기
            const urlParams = new URLSearchParams(window.location.search);
            const secretId = urlParams.get('id'); 
            
            // 💡 2. 허용된 6명의 비밀코드 목록 (여기에 없으면 전송 자체를 차단)
            const validIds = ['xdmh', 'jaym', 'dgrt', 'tgdy', 'aprk', 'taiy'];
            
            // 💡 3. 링크가 잘못되었을 때의 경고 처리
            if (!secretId || !validIds.includes(secretId)) {
                msg.style.color = "#ef4444";
                msg.innerHTML = `<i class="fa-solid fa-link-slash"></i><span>유효하지 않은 링크! 링크 수정 금지</span>`;
                return; // 여기서 멈춤 (서버로 신호를 보내지 않음)
            }
            
            // 4. 정상적인 링크일 경우에만 구글로 발송
            const baseUrl = "https://script.google.com/macros/s/AKfycbw3FHOmMWb-bdpMOzLvto7CJOKRcUNJQuTMnR8lYOOu4iHulO8M0loDyeMS_LkvT7k8/exec"; 
            const url = baseUrl + "?id=" + encodeURIComponent(secretId);
            
            msg.style.color = "#ff6b8b";
            msg.innerHTML = `<i class="fa-solid fa-spinner spin"></i><span>신호 보내는 중...</span>`;
            
            fetch(url)
                .then(() => {
                    msg.style.color = "#ff477e";
                    msg.innerHTML = `<i class="fa-solid fa-circle-check"></i><span>호출 성공! 곧 디코로 찾아갈게요~</span>`;
                })
                .catch(() => {
                    msg.style.color = "#ef4444";
                    msg.innerHTML = `<i class="fa-solid fa-circle-exclamation"></i><span>실패했어요! 다시 눌러주세요</span>`;
                });
        }
    </script>
</body>
</html>
